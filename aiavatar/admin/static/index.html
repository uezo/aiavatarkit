<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ADMIN_TITLE}}</title>
  <script src="assets/theme.js"></script>
  <link rel="stylesheet" href="assets/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <!-- <p class="eyebrow">Operations</p> -->
      <h1>{{ADMIN_TITLE}}</h1>
    </div>
    <div class="topbar-actions">
      <div id="global-status" class="status" role="status"></div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Switch to dark mode" title="Switch to dark mode">
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/>
        </svg>
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
    </div>
  </header>
  <div class="shell">
    <nav id="navigation" class="navigation" aria-label="Admin sections"></nav>
    <main id="content" tabindex="-1"></main>
  </div>
  <script type="module" src="assets/admin-app.js"></script>
</body>
</html>
